substitutions:
  _REGION: 'europe-west2'

steps:
  # Step 1: Docker Build and Push
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mcp-servers/onedrive-mcp-server:${SHORT_SHA}', '-f', 'mcp_servers/onedrive/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mcp-servers/onedrive-mcp-server:${SHORT_SHA}']

  # Step 2: Tag as latest
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'docker-tag-latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud artifacts docker tags add \
          ${_REGION}-docker.pkg.dev/${PROJECT_ID}/mcp-servers/onedrive-mcp-server:${SHORT_SHA} \
          ${_REGION}-docker.pkg.dev/${PROJECT_ID}/mcp-servers/onedrive-mcp-server:latest

  # Step 3: Initialize Terraform with Dynamic Backend
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    dir: 'terraform/onedrive_mcp_server_resources'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-terraform-state" \
          -backend-config="prefix=terraform/state/onedrive-mcp-server-resources"

  # Step 4: Apply Terraform
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-apply'
    args: ['apply', '-auto-approve', '-var=project_id=${PROJECT_ID}', '-var=main_region=${_REGION}', '-var=mcp_server_cloud_run_image_tag=${SHORT_SHA}']
    dir: 'terraform/onedrive_mcp_server_resources'

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
