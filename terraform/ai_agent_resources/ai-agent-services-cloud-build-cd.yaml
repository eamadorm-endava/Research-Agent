substitutions:
  _REGION: "us-central1"
  _AGENT_DISPLAY_NAME: "Research Agent"
  _MODEL_ARMOR_TEMPLATE_ID: "security-template"
  _AGENT_SA: "adk-agent"
  _DRIVE_URL: "https://drive-mcp-server-753988132239.us-central1.run.app"
  _GE_APP_ID: "newgeapp_1773239361913"
  _GE_REGION: "global"
  _GE_AGENT_DESCRIPTION: "Agent capable of searching and retrieving information from Google Drive, GCP and GCS using user's credentials"

steps:
  # Step 1: Initialize Terraform with Dynamic Backend
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-terraform-state" \
          -backend-config="prefix=terraform/state/ai-agent-resources"
    dir: 'terraform/ai_agent_resources'

  # Step 2: Run Terraform Apply
  # Creates the required permissions and service accounts to run the agent
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-apply'
    args: ['apply', '-auto-approve']
    dir: 'terraform/ai_agent_resources'
  
  # Step 3: GE Pre-Deployment Steps (Cleanup Agent, Cleanup Auth, Create Auth)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'ge-pre-deploy'
    entrypoint: 'bash'
    secretEnv: ['GEMINI_DRIVE_AUTH_ID', 'DRIVE_OAUTH_CLIENT_ID', 'DRIVE_OAUTH_CLIENT_SECRET']
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y jq curl
        chmod +x terraform/ai_agent_resources/scripts/ge_agent_manager.sh
        
        echo "1. Checking and deleting existing agent in GE..."
        ./terraform/ai_agent_resources/scripts/ge_agent_manager.sh delete-agent \
          --project ${PROJECT_ID} \
          --ge-location ${_GE_REGION} \
          --app-id ${_GE_APP_ID} \
          --display-name "${_AGENT_DISPLAY_NAME}"

        echo "2. Deleting Auth ID in GE..."
        ./terraform/ai_agent_resources/scripts/ge_agent_manager.sh delete-auth-id \
          --project ${PROJECT_ID} \
          --ge-location ${_GE_REGION} \
          --auth-id "$$GEMINI_DRIVE_AUTH_ID"

        _DRIVE_OAUTH_AUTH_URI="https://accounts.google.com/o/oauth2/v2/auth?client_id=$$DRIVE_OAUTH_CLIENT_ID&redirect_uri=https%3A%2F%2Fvertexaisearch.cloud.google.com%2Fstatic%2Foauth%2Foauth.html&scope=https://www.googleapis.com/auth/drive.readonly%20https://www.googleapis.com/auth/drive.file%20https://www.googleapis.com/auth/documents&include_granted_scopes=true&response_type=code&access_type=offline&prompt=consent"
        _OAUTH_TOKEN_URI="https://oauth2.googleapis.com/token"

        echo "3. Creating Auth ID $$GEMINI_DRIVE_AUTH_ID..."
        ./terraform/ai_agent_resources/scripts/ge_agent_manager.sh create-auth-id \
          --project ${PROJECT_ID} \
          --ge-location ${_GE_REGION} \
          --auth-id "$$GEMINI_DRIVE_AUTH_ID" \
          --client-id "$$DRIVE_OAUTH_CLIENT_ID" \
          --client-secret "$$DRIVE_OAUTH_CLIENT_SECRET" \
          --auth-uri "${_DRIVE_OAUTH_AUTH_URI}" \
          --token-uri "${_OAUTH_TOKEN_URI}"

  
  # Step 4: Deploy the AI-Agent to Agent Engine
  - name: 'python:3.12'
    id: 'deploy-agent-engine'
    entrypoint: 'sh'
    secretEnv: ['GEMINI_DRIVE_AUTH_ID']
    args:
      - '-c'
      - |
        pip install uv
        uv export \
          --group ai-agent \
          --no-hashes \
          --no-annotate \
          -o agent/core_agent/requirements.txt
        uv run --group ai-agent --group dev python -m agent.deployment.deploy \
          --project ${PROJECT_ID} \
          --location ${_REGION} \
          --display-name "${_AGENT_DISPLAY_NAME}" \
          --source-packages=./agent \
          --entrypoint-module=agent.core_agent.agent \
          --entrypoint-object=app \
          --requirements-file=./agent/core_agent/requirements.txt \
          --service-account=${_AGENT_SA}@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars="PROJECT_ID=${PROJECT_ID},REGION=${_REGION},MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID},DRIVE_URL=${_DRIVE_URL},GEMINI_DRIVE_AUTH_ID=$$GEMINI_DRIVE_AUTH_ID" 2>&1 | tee deploy_output.txt
        
        grep -o "reasoningEngines/[0-9]*" deploy_output.txt | tail -n 1 | cut -d'/' -f2 > /workspace/adk_resource.txt
        echo "Captured ADK_RESOURCE_ID: $(cat /workspace/adk_resource.txt)"


  # Step 5: Register the Agent in GE
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'ge-register-agent'
    entrypoint: 'bash'
    secretEnv: ['GEMINI_DRIVE_AUTH_ID']
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y jq curl
        ADK_RESOURCE_ID=$(cat /workspace/adk_resource.txt)

        if [ -z "$ADK_RESOURCE_ID" ]; then
            echo "Failed to capture ADK_RESOURCE_ID"
            exit 1
        fi

        echo "Registering Agent in GE..."
        ./terraform/ai_agent_resources/scripts/ge_agent_manager.sh register-agent \
          --project ${PROJECT_ID} \
          --ge-location ${_GE_REGION} \
          --app-id ${_GE_APP_ID} \
          --display-name "${_AGENT_DISPLAY_NAME}" \
          --description "${_GE_AGENT_DESCRIPTION}" \
          --agent-engine-location ${_REGION} \
          --adk-resource-id "${ADK_RESOURCE_ID}" \
          --auth-id "$$GEMINI_DRIVE_AUTH_ID"

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/GEMINI_DRIVE_AUTH_ID/versions/latest
      env: 'GEMINI_DRIVE_AUTH_ID'
    - versionName: projects/${PROJECT_ID}/secrets/DRIVE_OAUTH_CLIENT_ID/versions/latest
      env: 'DRIVE_OAUTH_CLIENT_ID'
    - versionName: projects/${PROJECT_ID}/secrets/DRIVE_OAUTH_CLIENT_SECRET/versions/latest
      env: 'DRIVE_OAUTH_CLIENT_SECRET'

# Ensure this Service Account has 'Storage Object Admin' on the state bucket
serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

# Configuration for the build runner
options:
  logging: CLOUD_LOGGING_ONLY
