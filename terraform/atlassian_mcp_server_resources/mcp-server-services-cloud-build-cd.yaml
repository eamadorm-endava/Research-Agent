substitutions:
  _REGION: europe-west1
  _REPO_NAME: mcp-servers
  _SERVICE_NAME: atlassian-mcp-server

steps:
  # Step 1: Initialize Terraform with Dynamic Backend
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    dir: 'terraform/atlassian_mcp_server_resources'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-terraform-state" \
          -backend-config="prefix=terraform/state/atlassian-mcp-server-resources"

  # Step 2: Bootstrap required APIs before Docker push/apply
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-bootstrap'
    args:
      - 'apply'
      - '-var=project_id=${PROJECT_ID}'
      - '-var=main_region=${_REGION}'
      - '-var=landing_zone_bucket=${PROJECT_ID}-ai-agent-landing-zone'
      - '-target=module.enable_apis'
      - '-auto-approve'
    dir: 'terraform/atlassian_mcp_server_resources'

  # Step 3: Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest',
      '-f', 'mcp_servers/atlassian/Dockerfile',
      '.'
    ]

  # Step 4: Docker Push
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest

  # Step 5: Full Terraform Plan
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-plan'
    args: ['plan', '-var=project_id=${PROJECT_ID}', '-var=main_region=${_REGION}', '-var=landing_zone_bucket=${PROJECT_ID}-ai-agent-landing-zone', '-var=mcp_server_cloud_run_image_tag=${COMMIT_SHA}', '-out=tfplan']
    dir: 'terraform/atlassian_mcp_server_resources'

  # Step 6: Full Terraform Apply
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-apply'
    args: ['apply', '-auto-approve', 'tfplan']
    dir: 'terraform/atlassian_mcp_server_resources'

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
