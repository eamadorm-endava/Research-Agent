substitutions:
  _LOCATION: us-central1
  _REPO_NAME: mcp-servers
  _SERVICE_NAME: gcs-mcp-server

steps:
  # Step 1: Initialize Terraform
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    dir: 'terraform/gcs_mcp_server_resources'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-terraform-state" \
          -backend-config="prefix=terraform/state/gcs-mcp-server-resources"

  # Step 2: Bootstrap required APIs before Docker push/apply
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-bootstrap'
    args: 
      - 'apply'
      - '-target=module.enable_apis'
      - '-auto-approve'
      - '-var=project_id=${PROJECT_ID}'
      - '-var=main_region=${_LOCATION}'
      - '-var=landing_zone_bucket=${PROJECT_ID}-ai-agent-landing-zone'
      - '-var=kb_ingestion_bucket=${PROJECT_ID}-kb-landing-zone'
    dir: 'terraform/gcs_mcp_server_resources'

  # Step 3: Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args: [
      'build', 
      '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}', 
      '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest', 
      '-f', 'mcp_servers/gcs/Dockerfile', 
      '.'
    ]

  # Step 4: Docker Push
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker push ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}
        docker push ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest

  # Step 5: Full Terraform Plan
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-plan'
    args: 
      - 'plan'
      - '-var=mcp_server_cloud_run_image_tag=${COMMIT_SHA}'
      - '-var=project_id=${PROJECT_ID}'
      - '-var=main_region=${_LOCATION}'
      - '-var=landing_zone_bucket=${PROJECT_ID}-ai-agent-landing-zone'
      - '-var=kb_ingestion_bucket=${PROJECT_ID}-kb-landing-zone'
      - '-out=tfplan'
    dir: 'terraform/gcs_mcp_server_resources'

  # Step 6: Full Terraform Apply
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-apply'
    args: ['apply', '-auto-approve', 'tfplan']
    dir: 'terraform/gcs_mcp_server_resources'

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
