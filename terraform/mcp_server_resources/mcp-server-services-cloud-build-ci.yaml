substitutions:
  _LOCATION: us-central1
  _REPO_NAME: mcp_servers
  _SERVICE_NAME: bigquery-mcp-server


steps:
  # Step 1: Initialize Terraform with Dynamic Backend
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=${PROJECT_ID}-terraform-state" \
          -backend-config="prefix=terraform/state/mcp-server-resources"
    dir: 'terraform/mcp_server_resources'

  # Step 2: Format Check (Terraform)
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-fmt'
    args: ['fmt', '-check']
    dir: 'terraform/mcp_server_resources'

  # Step 3: Format Check (Python)
  - name: 'python:3.12'
    id: 'python-lint'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y make
        pip install uv
        make run-bq-precommit

  # Step 4: Python Tests
  - name: 'python:3.12'
    id: 'bq-mcp-test'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y make
        pip install uv
        make run-bq-tests

  # Step 5: Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}', '-f', 'mcp_servers/big_query/Dockerfile', '.']

  # Step 6: Docker Test (HTTP Health Check)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-test-http'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Start the container joined to the host network so we can hit it easily
        docker run -d --name bq-mcp-test-container --network cloudbuild -p 8080:8080 ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}
        
        # Wait a few seconds for the Uvicorn server to start
        sleep 5
        
        # Use a temporary alpine container to curl the SSE endpoint
        echo "Testing HTTP endpoint..."
        docker run --network cloudbuild curlimages/curl -sSf http://bq-mcp-test-container:8080/sse || { 
          echo "Health check failed. Container logs:"
          docker logs bq-mcp-test-container
          # Clean up container before failing
          docker rm -f bq-mcp-test-container
          exit 1
        }
        
        echo "Health check passed."
        docker rm -f bq-mcp-test-container

  # Step 7: Validate (Terraform)
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-validate'
    args: ['validate']
    dir: 'terraform/mcp_server_resources'

  # Step 8: Plan (Terraform)
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-plan'
    args: ['plan', '-var=mcp_server_cloud_run_image_tag=ci', '-out=tfplan']
    dir: 'terraform/mcp_server_resources'


serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY