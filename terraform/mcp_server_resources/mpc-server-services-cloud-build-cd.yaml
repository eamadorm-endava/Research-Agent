steps:
  # Step 1: Initialize Terraform (Must match CI prefix)
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-init'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init \
          -backend-config="bucket=terraform-state" \
          -backend-config="prefix=terraform/state/mcp-server-resources"
    dir: 'terraform/mcp_server_resources'

  # Step 2: Apply
  - name: 'hashicorp/terraform:1.12.2'
    id: 'tf-apply'
    args: ['apply', '-auto-approve']
    dir: 'terraform/mcp_server_resources'

options:
  logging: CLOUD_LOGGING_ONLY
  serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/terraform-sa-gemini-project@${PROJECT_ID}.iam.gserviceaccount.com'